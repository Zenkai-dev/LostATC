<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LostATC - Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Hubot+Sans:ital,wght@0,200..900;1,200..900&family=Mona+Sans:ital,wght@0,200..900;1,200..900&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<!-- WOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOSH-->
<style>
  nav {
    background-color: rgb(230, 230, 230);
  }

  nav .btn,
  #itemsList .btn {
    background-color: white;
    border-color: #4a73c2;
    color: #4a73c2;
  }

  nav .btn:hover,
  #itemsList .btn:hover {
    background-color: #99d9eb;
  }

  #itemImg {
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  #itemProfileZ {
    overflow-y: auto
  }

  * {
    font-family: "Mona Sans", sans-serif;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: "Hubot Sans", sans-serif;
  }
</style>
<!-- WOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOSH-->

<body class="d-flex flex-column min-vh-100">

  <main class="flex-grow-1">
    <div class="container text-center py-2" style="max-height: 100vh;">
      <div class="row py-2">
        <div class="col">
          <h1>Admin Dashboard</h1>
        </div>
      </div>
      <div class="row rounded border"> <!-- List of Items-->
        <nav class="col-4 bgcustom p-3 h-100" style="overflow-y: auto;">
          <button class="btn" onclick="getDatabaseData().then(populateItemList);">
            <span class="btn-txt">Refresh Database</span>
          </button>
          <button class="btn" onclick="viewClaims();">
            <span class="btn-txt">View Claims & Inquires</span>
          </button>
          <div data-bs-spy="scroll" data-bs-smooth-scroll="true" class="scrollspy-example bgcustom" tabindex="0">
            <div class="list-group" id="itemsList">
              <!-- Items will be populated here -->
            </div>
          </div>
        </nav>
        <div class="col-8 bgcustom position-relative py-2" id="itemProfileZ"> <!-- Item Display Profile-->
        </div>
      </div>
  </main>
  <!-- WOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOSH-->



</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script type="module" src="dashboard.js"></script>
</body>

</html>
