<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LostATC - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hubot+Sans:ital,wght@0,200..900;1,200..900&family=Mona+Sans:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<!-- WOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOSH-->
<style>
  body {
    background-color: rgb(255, 255, 255);
  }
</style><style>
  nav {
    background-color: rgb(230, 230, 230);
  }
  nav .btn, #itemsList .btn {
    background-color: white;
    border-color: #4a73c2;
    color: #4a73c2;
  }

  nav .btn:hover, #itemsList .btn:hover {
    background-color: #99d9eb;
  }

  #itemImg { 
            aspect-ratio: 1 / 1;
            object-fit: cover;}
    #itemProfileZ {
      overflow-y: auto
    }

        * {
            font-family: "Mona Sans", sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: "Hubot Sans", sans-serif;
        }
</style>
<!-- WOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOSH-->
<body class="d-flex flex-column min-vh-100">

  <main class="flex-grow-1">
    <div class="container-fluid text-center p-5">
      <div class="row">
        <div class="col">
          <h1 class="">LostATC Admin Panel</h1>
          <p class="lead">
            Login to access your dashboard.
          </p>
        </div>
      </div>
      <div class="row justify-content-center mt-4 pt-5">
        <div class="col-12 col-md-6 col-lg-4">
          <form>
            <div class="mb-3 text-start">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" placeholder="Enter your username">
            </div>
            <div class="mb-3 text-start">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Enter your password">
            </div>
            <button type="button" class="btn btn-outline-primary" onclick="loginAdmin()">
              <span class="btn-txt">Login</span>
            </button>
            <script type="module" src="user.js"></script>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="mt-auto pt-3 pb-3 d-flex justify-content-center">
    <p class="text-light mb-0">
      &copy; 2026 LostATC. All rights reserved.
    </p>
  </footer>
<!-- WOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOSH-->

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
